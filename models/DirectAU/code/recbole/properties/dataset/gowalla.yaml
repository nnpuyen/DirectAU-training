# Atomic File Format
field_separator: "\t"
seq_separator: " "

# Common Features
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
RATING_FIELD: rating
LABEL_FIELD: label
seq_len: ~

# NegSample Prefix for Pair-wise DataLoader
NEG_PREFIX: neg_

# Selectively Loading
load_col:
    inter: [user_id, item_id, timestamp]
unload_col: ~
unused_col: ~
additional_feat_suffix: ~

# Filtering
rm_dup_inter: ~
lowest_val: ~
highest_val: ~
equal_val: ~
not_equal_val: ~
filter_inter_by_user_or_item: True
max_user_inter_num: ~
min_user_inter_num: 5
max_item_inter_num: ~
min_item_inter_num: 5

# Preprocessing
fields_in_same_space: ~
preload_weight: ~
normalize_field: ~
normalize_all: ~

# Use fixed benchmark split files:
# gowalla.train.inter, gowalla.valid.inter, gowalla.test.inter
benchmark_filename: [train, valid, test]
